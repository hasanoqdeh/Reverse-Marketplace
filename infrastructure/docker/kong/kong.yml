_format_version: "3.0"

services:
  # Admin Dashboard Service
  - name: admin-dashboard
    url: http://admin-dashboard:3008
    routes:
      - name: admin-dashboard-root-route
        paths:
          - /
        strip_path: false
        methods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS

  # Identity Service
  - name: identity-service
    url: http://identity-service:3000
    routes:
      - name: identity-service-route
        paths:
          - /api/identity
        methods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
      - name: analytics-service-route
        paths:
          - /api/analytics
        strip_path: true
        methods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS

  # Request Service
  - name: request-service
    url: http://request-service:3001
    routes:
      - name: request-service-route
        paths:
          - /api/request
        methods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS

  # Matching Engine
  - name: matching-engine
    url: http://matching-engine:3002
    routes:
      - name: matching-engine-route
        paths:
          - /api/matching
        methods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS

  # Bidding Service
  - name: bidding-service
    url: http://bidding-service:3003
    routes:
      - name: bidding-service-route
        paths:
          - /api/bidding
        methods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS

  # Notification Service
  - name: notification-service
    url: http://notification-service:3004
    routes:
      - name: notification-service-route
        paths:
          - /api/notification
        methods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS

  # Chat Service
  - name: chat-service
    url: http://chat-service:3005
    routes:
      - name: chat-service-route
        paths:
          - /api/chat
        methods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS

  # Payment Service
  - name: payment-service
    url: http://payment-service:3006
    routes:
      - name: payment-service-route
        paths:
          - /api/payment
        methods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS

plugins:
  # Global CORS for all services
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Accept-Version
        - Content-Length
        - Content-MD5
        - Content-Type
        - Date
        - Authorization
        - Host
      exposed_headers:
        - X-Total-Count

  # Rate limiting for all services - DISABLED FOR DEVELOPMENT
  # - name: rate-limiting
  #   config:
  #     minute: 100
  #     hour: 1000
  #     fault_tolerant: true

  # Request transformation for API routes
  - name: request-transformer
    config:
      add:
        headers:
          - "X-Gateway-Version:1.0"

consumers:
  - username: anonymous
  # Rate limiting for consumers - DISABLED FOR DEVELOPMENT
  # plugins:
  #   - name: rate-limiting
  #     config:
  #       minute: 100
  #       hour: 1000
