apiVersion: apps/v1
kind: Deployment
metadata:
  name: matching-engine
  namespace: backend
  labels:
    app: matching-engine
spec:
  replicas: 2
  selector:
    matchLabels:
      app: matching-engine
  template:
    metadata:
      labels:
        app: matching-engine
    spec:
      containers:
      - name: matching-engine
        image: reverse-marketplace/matching-engine:latest
        ports:
        - containerPort: 3002
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "100m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 3002
          initialDelaySeconds: 60
        readinessProbe:
          httpGet:
            path: /health
            port: 3002
          initialDelaySeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: matching-engine
  namespace: backend
spec:
  selector:
    app: matching-engine
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3002
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: matching-engine-hpa
  namespace: backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: matching-engine
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
