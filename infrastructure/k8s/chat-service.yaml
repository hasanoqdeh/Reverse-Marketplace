apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-service
  namespace: backend
  labels:
    app: chat-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chat-service
  template:
    metadata:
      labels:
        app: chat-service
    spec:
      containers:
      - name: chat-service
        image: reverse-marketplace/chat-service:latest
        ports:
        - containerPort: 3005
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "100m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 3005
          initialDelaySeconds: 60
        readinessProbe:
          httpGet:
            path: /health
            port: 3005
          initialDelaySeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: chat-service
  namespace: backend
spec:
  selector:
    app: chat-service
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3005
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: chat-service-hpa
  namespace: backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: chat-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
