version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: reverse-marketplace-db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT_EXTERNAL}:${DB_PORT}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ${DOCKER_NETWORK}
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: reverse-marketplace-redis
    ports:
      - "${REDIS_PORT_EXTERNAL}:${REDIS_PORT}"
    volumes:
      - redis_data:/data
    networks:
      - ${DOCKER_NETWORK}
    restart: unless-stopped

  # RabbitMQ Message Queue
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: reverse-marketplace-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST}
    ports:
      - "${RABBITMQ_PORT_EXTERNAL}:${RABBITMQ_PORT}"   # AMQP port
      - "${RABBITMQ_MGMT_PORT_EXTERNAL}:${RABBITMQ_MGMT_PORT}" # Management UI port
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
    networks:
      - ${DOCKER_NETWORK}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Backend API Gateway
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: reverse-marketplace-backend
    env_file:
      - .env
    environment:
      # Override hostnames for Docker networking
      DB_HOST: ${DB_HOST_DOCKER}
      DATABASE_HOST: ${DATABASE_HOST_DOCKER}
      DATABASE_URL: "postgresql://postgres:password@postgres:5432/reverse_marketplace"
      DATABASE_USER: postgres
      DATABASE_NAME: reverse_marketplace
      IDENTITY_DATABASE_URL: "postgresql://postgres:password@postgres:5432/reverse_marketplace"
      REQUEST_DATABASE_URL: "postgresql://postgres:password@postgres:5432/reverse_marketplace"
      REDIS_HOST: ${REDIS_HOST_DOCKER}
      RABBITMQ_HOST: ${RABBITMQ_HOST_DOCKER}
      MONGO_URI: "mongodb://mongo:27017/reverse_marketplace"
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL_DOCKER}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL_DOCKER}
    ports:
      - "${BACKEND_PORT_EXTERNAL}:${BACKEND_PORT}"
    depends_on:
      - postgres
      - redis
      - rabbitmq
      - mongo
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - ${DOCKER_NETWORK}
    restart: unless-stopped
    command: >
      sh -c "npx prisma generate --schema=src/prisma/schema.prisma &&
             node database/migrate.js &&
             npm run dev"

  # Admin Panel
  admin-panel:
    build:
      context: ./admin-panel
      dockerfile: Dockerfile
    container_name: reverse-marketplace-admin
    env_file:
      - .env
    environment:
      # Override URLs for Docker networking - use localhost for browser access
      NEXT_PUBLIC_API_URL: http://localhost:3000/api/v1
      NEXT_PUBLIC_WS_URL: ws://localhost:3000
    ports:
      - "${ADMIN_PORT_EXTERNAL}:${ADMIN_PORT}"
    depends_on:
      - backend
    volumes:
      - ./admin-panel:/app
      - /app/node_modules
      - /app/.next
    networks:
      - ${DOCKER_NETWORK}
    restart: unless-stopped
    command: npm run dev

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  reverse-marketplace:
    driver: bridge
