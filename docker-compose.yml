version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: reverse-marketplace-db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT_EXTERNAL}:${DB_PORT}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ${DOCKER_NETWORK}
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: reverse-marketplace-redis
    ports:
      - "${REDIS_PORT_EXTERNAL}:${REDIS_PORT}"
    volumes:
      - redis_data:/data
    networks:
      - ${DOCKER_NETWORK}
    restart: unless-stopped

  # RabbitMQ Message Queue
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: reverse-marketplace-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST}
    ports:
      - "${RABBITMQ_PORT_EXTERNAL}:${RABBITMQ_PORT}"   # AMQP port
      - "${RABBITMQ_MGMT_PORT_EXTERNAL}:${RABBITMQ_MGMT_PORT}" # Management UI port
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
    networks:
      - ${DOCKER_NETWORK}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # MongoDB Database
  mongo:
    image: mongo:7
    container_name: reverse-marketplace-mongo
    ports:
      - "${MONGO_PORT_EXTERNAL}:${MONGO_PORT}"
    volumes:
      - mongo_data:/data/db
    networks:
      - ${DOCKER_NETWORK}
    restart: unless-stopped

  # Backend API Gateway
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: reverse-marketplace-backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: "postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST_DOCKER}:${DB_PORT}/${DB_NAME}"
      DB_HOST: "${DB_HOST_DOCKER}"
      REDIS_HOST: "${REDIS_HOST_DOCKER}"
      REDIS_URL: "redis://${REDIS_HOST_DOCKER}:${REDIS_PORT}"
      RABBITMQ_HOST: "${RABBITMQ_HOST_DOCKER}"
      RABBITMQ_URL: "amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@${RABBITMQ_HOST_DOCKER}:${RABBITMQ_PORT}"
      MONGO_URI: "mongodb://mongo:${MONGO_PORT}/reverse_marketplace"
    ports:
      - "${BACKEND_PORT_EXTERNAL}:${BACKEND_PORT}"
    depends_on:
      - postgres
      - redis
      - rabbitmq
      - mongo
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - ${DOCKER_NETWORK}
    restart: unless-stopped
    command: >
      sh -c "npx prisma generate --schema=src/prisma/schema.prisma &&
             node database/migrate.js &&
             npm run dev"

  # Admin Panel
  admin-panel:
    build:
      context: ./admin-panel
      dockerfile: Dockerfile
    container_name: reverse-marketplace-admin
    env_file:
      - ./admin-panel/.env
    ports:
      - "${ADMIN_PORT_EXTERNAL}:${ADMIN_PORT}"
    depends_on:
      - backend
    volumes:
      - ./admin-panel:/app
      - /app/node_modules
      - /app/.next
    networks:
      - ${DOCKER_NETWORK}
    restart: unless-stopped
    command: npm run dev

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  mongo_data:

networks:
  reverse-marketplace:
    driver: bridge
